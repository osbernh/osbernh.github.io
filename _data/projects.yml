- title: Assessing Democratic Accountability in East Asian Democracies
  period: May 2024 - Present
  bullets:
    - Joint project with Waseda University and Korea University on how citizens respond to undemocratic acts by legislators.
    - Uses cross-national survey experiments spanning Japan, South Korea, Taiwan, the United States, and Australia.
- title: Environmental Attitudes and Nuclear Energy Acceptance
  period: June 2024 - Present
  bullets:
    - Survey experiments on environmental values, perceived risk, and energy preferences.
    - Examines NIMBY attitudes, location effects, and support for energy transition policy.
- title: Unearthing the Foundations of Democratic Support in Myanmar
  period: February 2022 - Present
  bullets:
    - Analyses pre-coup survey data to study democratic aspirations, religion, ethnicity, and consolidation.
- title: Establishing Taiwan's First Probability-Based Online Panel (NTUWS)
  period: November 2018 - Present
  bullets:
    - Led the development of a probability-based mixed-mode online panel framework in Taiwan.
- title: Computerized Survey Sampling Leveraging GIS/GPS Technologies
  period: September 2018 - Present
  bullets:
    - Developed a GIS/GPS-based sampling approach and open-source tooling for survey researchers.
- title: Big Data Analysis of Online Platforms in Taiwan and China
  period: January 2016 - February 2021
  bullets:
    - Studied censorship strategies and public discourse on digital platforms.
- title: Cultural Values, Inequality, and Democratic Consolidation
  period: September 2015 - Present
  bullets:
    - Explores how liberty-equality values shape democratic support and redistribution preferences.
