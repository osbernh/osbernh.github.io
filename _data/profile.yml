bio: >
  Osbern Huang is a Research Fellow at Griffith University whose work sits at
  the intersection of comparative politics, democratic resilience, survey
  research, and public opinion. His research draws on experience across Taiwan,
  Australia, China, and Myanmar, with a particular focus on how cultural values,
  institutions, and survey design shape democratic attitudes and political
  behaviour.
summary_points:
  - Leads and supports large-scale survey projects, including the Australian Constitutional Values Survey (ACVS) 2025.
  - Brings experience from Griffith University, National Taiwan University, ANU, and Ipsos.
  - Combines academic research with applied expertise in data collection, GIS sampling, and mixed-mode survey design.
